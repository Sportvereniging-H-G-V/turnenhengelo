# DO NOT RENAME JOBS — branch-protection contract.
# Because each job calls a reusable workflow, GitHub formats the required
# status-check context as "<job-id> / <reusable-job-name>", NOT as
# "<workflow-name> / <job-id>". The actual required contexts are:
#   "lint / lint", "test / test",
#   "dependency-audit / dependency-audit", "secret-scan / secret-scan"
# Renaming the job IDs below (lint, test, dependency-audit, secret-scan)
# or the job names inside the reusable workflows will break branch protection.
# See docs/ci-quality-gate-baseline.md and SPO-20 / SPO-47 / SPO-125 for context.
name: CI Quality Gate Baseline

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml

  test:
    uses: ./.github/workflows/reusable-test.yml

  dependency-audit:
    uses: ./.github/workflows/reusable-dependency-audit.yml
    with:
      audit-level: critical

  secret-scan:
    uses: ./.github/workflows/reusable-secret-scan.yml
