# Voegt nieuwe en bestaande pull requests toe aan het HGV project board.
# Project: https://github.com/orgs/Sportvereniging-H-G-V/projects/4 (org project 4).
# Voeg secret PROJECT_TOKEN toe (PAT met scope "project") indien nodig.

name: Add PRs to project board

on:
  pull_request_target:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: read

jobs:
  add-to-project:
    name: Add PR(s) to project
    runs-on: ubuntu-latest
    steps:
      - name: Add single PR (triggered by PR event)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const r = await github.graphql(
              `query($org: String!, $number: Int!) { organization(login: $org) { projectV2(number: $number) { id title } } }`,
              { org: 'Sportvereniging-H-G-V', number: 4 }
            );
            const projectId = r?.organization?.projectV2?.id;
            if (!projectId) {
              console.log('::warning::Project 4 niet gevonden. Controleer of PROJECT_TOKEN (PAT met scope project) is ingesteld.');
              return;
            }
            const contentId = context.payload.pull_request.node_id;
            const result = await github.graphql(
              `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }`,
              { projectId, contentId }
            );
            console.log('PR toegevoegd aan project:', result?.addProjectV2ItemById?.item?.id || 'ok');

      - name: Add all open PRs (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const r = await github.graphql(
              `query($org: String!, $number: Int!) { organization(login: $org) { projectV2(number: $number) { id title } } }`,
              { org: 'Sportvereniging-H-G-V', number: 4 }
            );
            const projectId = r?.organization?.projectV2?.id;
            if (!projectId) {
              throw new Error('Project 4 niet gevonden. Controleer of PROJECT_TOKEN (PAT met scope project) is ingesteld.');
            }
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            console.log(`Gevonden: ${pulls.length} open PR(s).`);
            for (const pr of pulls) {
              try {
                await github.graphql(
                  `mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item { id }
                    }
                  }`,
                  { projectId, contentId: pr.node_id }
                );
                console.log(`Toegevoegd: #${pr.number} ${pr.title}`);
              } catch (err) {
                if (err.message?.includes('already exists') || err.errors?.[0]?.message?.includes('already'))
                  console.log(`Al in project: #${pr.number}`);
                else
                  console.warn(`Fout bij #${pr.number}:`, err.message);
              }
            }
