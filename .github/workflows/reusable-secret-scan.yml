name: Reusable Secret Scan

on:
  workflow_call:

# Permissions must match the caller (ci-quality-gate.yml grants contents: read).
# GitHub silently drops any elevated grant a reusable workflow requests beyond
# what the caller allows. SARIF upload (security-events: write) is intentionally
# out of scope for the baseline; add a separate reusable-secret-scan-sarif.yml
# variant and elevate caller permissions when SARIF is wired.
permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks is invoked as a binary rather than via gitleaks/gitleaks-action@v2
      # because the action requires a paid GITLEAKS_LICENSE for org-owned repos.
      # The upstream gitleaks CLI itself is MIT-licensed and free for any use.
      # See docs/ci-quality-gate-baseline.md for the licensing rationale.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${tmpdir}/gitleaks.tar.gz"
          tar -xzf "${tmpdir}/gitleaks.tar.gz" -C "${tmpdir}" gitleaks
          sudo install -m 0755 "${tmpdir}/gitleaks" /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --exit-code 1
